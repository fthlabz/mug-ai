<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Print-AI: Mug, Canvas & Wallpaper Factory</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; 
            --primary: #3b82f6; --primary-hover: #2563eb; 
            --factory: #8b5cf6; --factory-hover: #7c3aed;
            --success: #10b981; --warning: #f59e0b; --upscale: #ec4899;
        }
        
        html, body { overflow-x: hidden; max-width: 100vw; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }
        
        .app-container { 
            background: var(--card-bg); padding: 30px; border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 100%; max-width: 800px; 
            display: flex; flex-direction: column; box-sizing: border-box;
            margin-top: 20px; margin-bottom: 20px;
        }
        
        .header { text-align: center; margin-bottom: 20px; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 26px; color: var(--primary); }
        .header p { margin: 5px 0 0; color: #94a3b8; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
        
        input[type="text"], input[type="number"], select { 
            width: 100%; max-width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #334155; 
            background: #0f172a; color: white; box-sizing: border-box; font-size: 15px; margin-bottom: 15px;
        }
        
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        optgroup { font-weight: bold; color: #fbbf24; background: #0f172a;}
        
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        button { 
            width: 100%; padding: 16px; color: white; border: none; border-radius: 10px; 
            font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-bottom: 10px;
        }
        #generateBtn { background: var(--primary); }
        #generateBtn:hover { background: var(--primary-hover); }
        
        /* Upscale ve İndirme Butonları */
        #upscaleBtn { background: var(--upscale); display: none; }
        #upscaleBtn:hover { background: #db2777; }
        .download-group { display: flex; gap: 10px; display: none; }
        #downloadPngBtn { background: var(--success); flex: 1; margin-bottom: 0;}
        #downloadJpgBtn { background: var(--warning); flex: 1; margin-bottom: 0;}
        #downloadPngBtn:hover { background: #059669; }
        #downloadJpgBtn:hover { background: #d97706; }
        button:disabled { background: #475569 !important; color: #94a3b8; cursor: not-allowed; }

        .progress-container { margin-bottom: 15px; display: none; background: #334155; border-radius: 8px; height: 8px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--upscale); width: 0%; transition: width 0.3s; }

        .image-box {
            flex-grow: 1; margin-bottom: 15px; border: 2px dashed #475569; border-radius: 12px;
            display: flex; justify-content: center; align-items: center; position: relative;
            background: #0f172a; overflow: hidden; min-height: 350px;
        }
        #status { font-size: 15px; color: #fbbf24; font-weight: bold; display: none; position: absolute; text-align: center; z-index: 10; padding: 15px; background: rgba(15,23,42,0.8); border-radius: 8px;}
        #result-img { max-width: 100%; max-height: 100%; display: none; object-fit: contain; z-index: 5; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .app-container { padding: 20px; margin-top: 10px; border-radius: 12px; }
            .settings-grid { grid-template-columns: 1fr; gap: 10px; } 
            .download-group { flex-direction: column; } 
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Ultimate Print-AI Engine</h1>
        <p>Mug, Canvas & Wallpaper Global Factory</p>
    </div>

    <label for="printSize">Baskı Modeli ve Üretim Çıktısı</label>
    <select id="printSize">
        <optgroup label="☕ Kupa Bardak (Hızlı Çıktı - Yapay Zeka Büyütmesiz)">
            <option value="wrap">Panoramik Kupa (9x21 cm Tam Tur - 2480x1063 px)</option>
            <option value="square">Kare Kupa (Tek Yön Baskı - 1063x1063 px)</option>
        </optgroup>
        <optgroup label="🖼️ Kanvas Tablo (Hızlı Çıktı - Yapay Zeka Büyütmesiz)">
            <option value="table">Dev Kanvas Tablo (4724x3543 px)</option>
        </optgroup>
        <optgroup label="🧱 Duvar Kağıdı (Otonom AI Replicate Büyütmeli)">
            <option value="seamless">Rulo Duvar Kağıdı (Kusursuz Tekrar - Kalite Büyütmeli)</option>
            <option value="mural">Mural / Tam Duvar Manzara (Panoramik - Kalite Büyütmeli)</option>
        </optgroup>
    </select>

    <label for="styleSelect">Dünyanın En İyi Sanat Akımları</label>
    <select id="styleSelect">
        <optgroup label="☕ Kupa Bardak Sanatları (Optik İllüzyonlar)">
            <option value="shadowbox">Buz/Kağıt Katmanlı Çerçeve (Derinlik İllüzyonu)</option>
            <option value="popout">Dışarı Fırlayan İllüzyon (3D Pop-Out)</option>
            <option value="portal">Başka Boyuta Açılan Kapı (Büyülü Portal)</option>
            <option value="embossed">Seramik Taş Kabartma (Rölyef Efekti)</option>
        </optgroup>
        <optgroup label="🖼️ Kanvas Tablo Sanatları (Premium)">
            <option value="oilpainting">Rönesans Yağlı Boya (Klasik Müze Eseri)</option>
            <option value="goldleaf">Modern Soyut Altın Varaklı (Lüks Canvas)</option>
            <option value="doubleexposure">Çift Pozlama (Sürrealist Fotoğrafçılık)</option>
            <option value="popart">Andy Warhol Pop Art (Renkli Tablo)</option>
        </optgroup>
        <optgroup label="🧱 Duvar Kağıdı Trendleri (Etsy En Çok Satanlar)">
            <option value="darkacademia">Dark Academia Botanik (Karanlık, Zarif, Vintage)</option>
            <option value="chinoiserie">Vintage Chinoiserie (Uzak Doğu Kuşları ve Çiçekler)</option>
            <option value="tropical">Tropikal Orman (Monstera ve Papağanlar)</option>
            <option value="scandinaviandiy">İskandinav Minimal Çocuk Odası (Sulu Boya)</option>
            <option value="mistyforest">Sisli Dağ ve Çam Ormanı (Sadece Mural İçin)</option>
        </optgroup>
    </select>

    <label for="promptInput">Odak Konusu / Ne Üretelim?</label>
    <input type="text" id="promptInput" placeholder="Örn: Aslan, Kahve Molası, Mavi Kuşlar...">

    <div class="settings-grid">
        <div>
            <label for="guidanceScale">AI Sadakati (Guidance)</label>
            <input type="number" id="guidanceScale" value="7.5" step="0.1" min="1" max="20">
        </div>
        <div>
            <label for="numSteps">Üretim Kalitesi (Steps)</label>
            <input type="number" id="numSteps" value="50" step="1" min="10" max="100">
        </div>
    </div>

    <button id="generateBtn" onclick="uretimeBasla()">🎨 Tasarımı Üret</button>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="image-box">
        <div id="status">Sistem hazır...</div>
        <img id="result-img" src="" alt="Sonuç">
    </div>

    <button id="upscaleBtn" onclick="replicateUpscaleYap()">🚀 Yapay Zeka ile HD Büyüt (Sadece Duvar Kağıdı)</button>
    
    <div class="download-group" id="downloadGroup">
        <button id="downloadPngBtn" onclick="gorseliIndirManuel('png')">⬇️ PNG İndir</button>
        <button id="downloadJpgBtn" onclick="gorseliIndirManuel('jpg')">⬇️ Yüksek Kalite JPEG İndir</button>
    </div>
</div>

<script>
    // Hayalet Kilit Standart Güvenlik Mimarisi
    const sifreliKasa = "U2FsdGVkX1/7ytPepRabsGIChr25zzuga4wkk5q74mbbLrGDZD4VhMKw8mng7QncKmcyJGwPxZ0gAPHu2yEU/w=="; 
    const gizliPin = "1453"; 
    
    let cachedApiKey = null;
    let lastGeneratedImgUrl = ""; 
    let finalUpscaledImgUrl = "";
    let isProcessing = false;
    let currentCategory = ""; // "mug_canvas" veya "wallpaper"

    function getToken() {
        if(cachedApiKey) return cachedApiKey;
        try {
            const bytes = CryptoJS.AES.decrypt(sifreliKasa, gizliPin);
            cachedApiKey = bytes.toString(CryptoJS.enc.Utf8);
            return cachedApiKey;
        } catch(e) { alert("Güvenlik Kilidi Hatası!"); return null; }
    }

    async function uretimeBasla() {
        if (isProcessing) return;
        const token = getToken(); if (!token) return;

        const userSubject = document.getElementById('promptInput').value;
        const printSize = document.getElementById('printSize').value;
        const selectedStyle = document.getElementById('styleSelect').value;
        const guidanceScale = parseFloat(document.getElementById('guidanceScale').value);
        const numSteps = parseInt(document.getElementById('numSteps').value);
        
        // API Çözünürlükleri ve Kategori Belirleme
        let apiWidth = 1024, apiHeight = 1024;
        
        if (printSize === "wrap") { apiWidth = 1344; apiHeight = 576; currentCategory = "mug_canvas"; } 
        else if (printSize === "square") { apiWidth = 1024; apiHeight = 1024; currentCategory = "mug_canvas"; } 
        else if (printSize === "table") { apiWidth = 1152; apiHeight = 864; currentCategory = "mug_canvas"; } 
        else if (printSize === "seamless") { apiWidth = 1024; apiHeight = 1024; currentCategory = "wallpaper"; } 
        else if (printSize === "mural") { apiWidth = 1344; apiHeight = 768; currentCategory = "wallpaper"; }

        const ui = {
            btnGen: document.getElementById('generateBtn'), btnUpscale: document.getElementById('upscaleBtn'),
            dlGroup: document.getElementById('downloadGroup'), status: document.getElementById('status'),
            resultImg: document.getElementById('result-img')
        };

        if (!userSubject) { alert("Lütfen ne üretmek istediğinizi yazın!"); return; }

        try {
            isProcessing = true; ui.btnGen.disabled = true;
            ui.btnUpscale.style.display = "none"; ui.dlGroup.style.display = "none";
            ui.status.innerHTML = "Çevriliyor... 🇹🇷 ➔ 🇬🇧"; ui.status.style.display = "block";

            let englishSubject = userSubject;
            try {
                const trRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(userSubject)}&langpair=tr|en`);
                const trData = await trRes.json();
                if(trData?.responseData?.translatedText) englishSubject = trData.responseData.translatedText;
            } catch(e) { console.warn("Çeviri hatası."); }

            ui.status.innerHTML = "Tasarım İşleniyor... ⏳";
            const seed = Math.floor(Math.random() * 1000000);
            
            // Mükemmel Prompt Mühendisliği
            let finalPrompt = "";
            let basePrompt = `${englishSubject}, `;
            let negativePrompt = "watermark, text, signature, low quality, deformed, ugly";
            let isSeamless = printSize === "seamless" ? "seamless repeating pattern, perfect tileable flat wallpaper texture, " : "";

            switch(selectedStyle) {
                // Kupa Stilleri
                case "shadowbox": finalPrompt = `A highly detailed ${englishSubject}, looking out from inside a deeply layered 3D cutout frame. Deep 3D shadow box, faux 3D optical illusion, flat print design.`; negativePrompt += ", mug, mockup, 3d object"; break;
                case "popout": finalPrompt = `${englishSubject} bursting and popping out of the surface. Faux 3D optical illusion, 3D relief pop-out effect, flat printable texture.`; negativePrompt += ", mug, mockup"; break;
                case "portal": finalPrompt = `A glowing interdimensional portal cracking open on a dark flat surface, revealing ${englishSubject} inside. Faux 3D optical illusion, extreme depth, flat canvas.`; negativePrompt += ", mug, mockup"; break;
                case "embossed": finalPrompt = `A flat printable surface showing a highly detailed ${englishSubject} sculpted as a 3D embossed ceramic relief. Tactile depth illusion.`; negativePrompt += ", mug, mockup"; break;
                // Tablo Stilleri
                case "oilpainting": finalPrompt = `A masterpiece Renaissance oil painting of ${englishSubject}. Museum quality fine art, dramatic chiaroscuro lighting, visible brush strokes, rich colors, flat canvas print.`; negativePrompt += ", frame, gallery wall"; break;
                case "goldleaf": finalPrompt = `Modern abstract luxury canvas art featuring ${englishSubject}. Dark moody background with brilliant glowing gold leaf accents, metallic texture illusion, elegant flat print.`; break;
                case "doubleexposure": finalPrompt = `Cinematic double exposure photography blending a perfect silhouette of ${englishSubject} with a breathtaking fantasy landscape. High contrast surrealism, flat print.`; break;
                case "popart": finalPrompt = `Vibrant retro comic book Pop Art of ${englishSubject}. Andy Warhol style, bright bold colors, halftone dots, thick comic outlines, flat poster graphic.`; break;
                // Duvar Kağıdı Stilleri
                case "darkacademia": finalPrompt = `${basePrompt}Dark academia botanical wallpaper, moody vintage scientific illustrations of flowers and foliage, deep dark dramatic background, ${isSeamless} 8k.`; break;
                case "chinoiserie": finalPrompt = `${basePrompt}Vintage Chinoiserie wallpaper style, elegant traditional asian art, soft pastel background, luxurious flora and fauna, ${isSeamless} flat vector illustration.`; break;
                case "tropical": finalPrompt = `${basePrompt}Lush tropical jungle botanical wallpaper, large monstera leaves, exotic palm fronds, vibrant rich colors, ${isSeamless} flat printable design.`; break;
                case "scandinaviandiy": finalPrompt = `${basePrompt}Cute Scandinavian nursery wallpaper, minimal watercolor aesthetic, soft neutral pastel colors, ${isSeamless} flat illustration.`; break;
                case "mistyforest": finalPrompt = `${basePrompt}Foggy pine forest mountain landscape, huge atmospheric wall mural, misty morning panoramic view, watercolor painting style, highly detailed continuous background.`; break;
            }

            const startRes = await fetch("/api/generate", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    token: token, prompt: finalPrompt, negative_prompt: negativePrompt,
                    guidance_scale: guidanceScale, num_inference_steps: numSteps,
                    width: apiWidth, height: apiHeight, seed: seed
                })
            });

            const startData = await startRes.json();
            if (startData.error) throw new Error(startData.error);
            let currentPredictionId = startData.id;

            while (currentPredictionId) {
                await new Promise(resolve => setTimeout(resolve, 2000));
                const pollRes = await fetch(`/api/status/${currentPredictionId}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: token })
                });
                const pollData = await pollRes.json();

                if (pollData.status === "succeeded") {
                    lastGeneratedImgUrl = pollData.output[0]; 
                    ui.resultImg.src = lastGeneratedImgUrl; ui.resultImg.style.display = "block";
                    ui.status.style.display = "none";
                    
                    // Kategoriye Göre Buton Gösterimi
                    if(currentCategory === "wallpaper") {
                        ui.btnUpscale.style.display = "block"; // Büyütme iste
                    } else {
                        ui.dlGroup.style.display = "flex"; // Direkt indir (Kupa/Tablo)
                    }
                    break;
                } else if (pollData.status === "failed") {
                    throw new Error("Üretim reddetti.");
                }
            }
        } catch (error) { alert("Hata: " + error.message); } 
        finally { ui.btnGen.disabled = false; isProcessing = false; }
    }

    async function replicateUpscaleYap() {
        if (!lastGeneratedImgUrl || isProcessing) return;
        const token = getToken(); if (!token) return;

        const ui = {
            status: document.getElementById('status'), progCont: document.getElementById('progressContainer'),
            progBar: document.getElementById('progressBar'), btnUpscale: document.getElementById('upscaleBtn'),
            dlGroup: document.getElementById('downloadGroup')
        };

        try {
            isProcessing = true; ui.btnUpscale.disabled = true;
            ui.status.innerHTML = "Replicate AI Detayları Çiziyor... (Bu işlem 1-2 dk sürebilir) 🚀"; 
            ui.status.style.display = "block"; ui.progCont.style.display = "block";
            
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 5; if(progress > 90) progress = 90;
                ui.progBar.style.width = `${progress}%`;
            }, 1000);

            // Replicate Payload Hatası Çözümü: image_url yerine genellikle beklenen 'image' anahtarı kullanılır.
            const upscaleRes = await fetch("/api/upscale", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    token: token, 
                    image: lastGeneratedImgUrl, // String did not match hatasını çözen kritik nokta
                    scale: 4 
                })
            });

            const upscaleData = await upscaleRes.json();
            clearInterval(progressInterval);

            if (upscaleData.status === "succeeded" || upscaleData.output) {
                finalUpscaledImgUrl = upscaleData.output;
                document.getElementById('result-img').src = finalUpscaledImgUrl; 
                ui.progBar.style.width = "100%";
                ui.status.innerHTML = "✅ AI Büyütme Tamam! Dosya Baskıya Hazır.";
                ui.btnUpscale.style.display = "none";
                ui.dlGroup.style.display = "flex"; 
            } else {
                throw new Error("Upscale işlemi başarısız oldu veya sunucu yanıtı hatalı.");
            }

        } catch (error) { 
            alert("Büyütme Hatası: " + error.message); 
            ui.status.style.display = "none"; ui.btnUpscale.disabled = false;
        } finally {
            setTimeout(() => { ui.progCont.style.display = "none"; }, 2000);
            isProcessing = false;
        }
    }

    async function gorseliIndirManuel(format) {
        // Hangi görseli indireceğiz? Duvar kağıdı ise büyütülmüşü, Kupa/Tablo ise orijinali.
        const sourceUrl = currentCategory === "wallpaper" ? finalUpscaledImgUrl : lastGeneratedImgUrl;
        if(!sourceUrl) return;

        const printSize = document.getElementById('printSize').value;
        const selectedStyle = document.getElementById('styleSelect').value;
        const filename = `Ultimate-AI-${printSize}-${selectedStyle}-${Date.now()}`;
        
        try {
            const response = await fetch(sourceUrl);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            const img = new Image(); img.crossOrigin = "Anonymous";
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let targetWidth, targetHeight;

                // İndirme Stratejisi
                if (currentCategory === "wallpaper") {
                    // Duvar kağıdı: AI Büyütmeden gelen orijinal saf pikseller
                    targetWidth = img.naturalWidth;
                    targetHeight = img.naturalHeight;
                } else {
                    // Kupa ve Tablo: Eski sündürme/matbaa şablonu mantığı
                    if (printSize === "wrap") { targetWidth = 2480; targetHeight = 1063; }
                    else if (printSize === "square") { targetWidth = 1063; targetHeight = 1063; }
                    else if (printSize === "table") { targetWidth = 4724; targetHeight = 3543; }
                }

                canvas.width = targetWidth; 
                canvas.height = targetHeight; 
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = "high";
                
                if (format === 'jpg' || format === 'jpeg') { 
                    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, canvas.width, canvas.height); 
                } 
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob((finalBlob) => {
                    const finalUrl = window.URL.createObjectURL(finalBlob);
                    const a = document.createElement('a'); a.href = finalUrl; a.download = `${filename}.${format}`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                }, format === 'png' ? 'image/png' : 'image/jpeg', 1.0); 
            };
            img.src = blobUrl;
        } catch (e) { window.open(sourceUrl, '_blank'); }
    }
</script>
</body>
</html>
