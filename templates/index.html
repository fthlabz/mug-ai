<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mug-AI: SaaS Autonomous Engine Ultimate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; 
            --primary: #3b82f6; --primary-hover: #2563eb; 
            --factory: #8b5cf6; --factory-hover: #7c3aed;
            --success: #10b981; --warning: #f59e0b;
        }
        
        html, body {
            overflow-x: hidden;
            max-width: 100vw;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }
        
        .app-container { 
            background: var(--card-bg); padding: 30px; border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 100%; max-width: 750px; 
            display: flex; flex-direction: column; box-sizing: border-box;
            margin-top: 20px; margin-bottom: 20px;
        }
        
        .header { text-align: center; margin-bottom: 20px; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 26px; color: var(--primary); }
        .header p { margin: 5px 0 0; color: #94a3b8; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
        
        input[type="text"], input[type="number"], select { 
            width: 100%; max-width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #334155; 
            background: #0f172a; color: white; box-sizing: border-box; font-size: 15px; margin-bottom: 15px;
            text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
        }
        
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        optgroup { font-weight: bold; color: #fbbf24; background: #0f172a;}
        
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .button-group { display: flex; gap: 10px; flex-shrink: 0; margin-top: 5px; }
        button { 
            flex: 1; padding: 16px; color: white; border: none; border-radius: 10px; 
            font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        #generateBtn { background: var(--primary); }
        #generateBtn:hover { background: var(--primary-hover); }
        #factoryBtn { background: var(--factory); }
        #factoryBtn:hover { background: var(--factory-hover); }
        button:disabled { background: #475569 !important; color: #94a3b8; cursor: not-allowed; }
        
        .download-group { display: flex; gap: 10px; margin-top: 15px; }
        #downloadPngBtn { background: var(--success); display: none; }
        #downloadJpgBtn { background: var(--warning); display: none; }
        #downloadPngBtn:hover { background: #059669; }
        #downloadJpgBtn:hover { background: #d97706; }

        .progress-container { margin-top: 15px; display: none; background: #334155; border-radius: 8px; height: 8px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--factory); width: 0%; transition: width 0.3s; }

        .image-box {
            flex-grow: 1; margin-top: 15px; border: 2px dashed #475569; border-radius: 12px;
            display: flex; justify-content: center; align-items: center; position: relative;
            background: #0f172a; overflow: hidden; min-height: 350px;
        }
        #status { font-size: 15px; color: #fbbf24; font-weight: bold; display: none; position: absolute; text-align: center; z-index: 10; padding: 15px; background: rgba(15,23,42,0.8); border-radius: 8px;}
        #result-img { max-width: 100%; max-height: 100%; display: none; object-fit: contain; z-index: 5; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .app-container { padding: 20px; margin-top: 10px; border-radius: 12px; }
            .header h1 { font-size: 22px; }
            .settings-grid { grid-template-columns: 1fr; gap: 10px; } 
            .button-group, .download-group { flex-direction: column; } 
            button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Mug-AI Autonomous Engine</h1>
        <p>Pro-Level SaaS Print Generator - Ultimate Edition</p>
    </div>

    <label for="printSize">Baskı Formatı (Akıllı Prompt Motoru Aktif)</label>
    <select id="printSize">
        <option value="wrap">Panoramik Kupa (9x21 cm Tam Tur - 2480x1063 px)</option>
        <option value="square">Kare Kupa / Yastık (Tek Yön Baskı - 1063x1063 px)</option>
        <option value="table">Devasa Tablo / Kanvas Duvar Sanatı (4724x3543 px)</option>
    </select>

    <label for="styleSelect">Artistik Stil ve İllüzyon Motoru</label>
    <select id="styleSelect">
        <optgroup label="🏛️ Dünya Klasikleri (Masterpieces)">
            <option value="renaissance">Rönesans Ustaları (Da Vinci, Michelangelo Etkisi)</option>
            <option value="impressionism">Empresyonizm (Van Gogh 'Yıldızlı Gece' Fırça Darbeleri)</option>
            <option value="surrealism">Sürrealizm (Salvador Dali Rüya Boyutu)</option>
        </optgroup>
        <optgroup label="🔥 Gelmiş Geçmiş En Hype Akımlar">
            <option value="unrealengine">Unreal Engine 5 (Hiper-Gerçekçi 8K, Ray Tracing)</option>
            <option value="synthwave">Retro Synthwave 80s (Neon Ağlar ve Günbatımı)</option>
            <option value="darkfantasy">Karanlık Fantastik RPG (Destansı, Gotik, Elden Ring Tarzı)</option>
            <option value="cyberpunk">Siberpunk Şehri (Hologramlar & Gelecek Kurgusu)</option>
        </optgroup>
        <optgroup label="🌀 Derinlik & 3D İllüzyonlar">
            <option value="popout">Dışarı Fırlayan İllüzyon (3D Pop-Out)</option>
            <option value="portal">Başka Boyuta Açılan Büyülü Portal</option>
            <option value="escher">İmkansız Geometri (Paradoks Döngüleri)</option>
            <option value="isometric">İzometrik 3D Minyatür Dünya (Tilt-Shift)</option>
            <option value="embossed">Taş / Seramik Kabartma (Rölyef)</option>
        </optgroup>
        <optgroup label="🎨 Modern & Dokusal Başyapıtlar">
            <option value="resin">Lüks Epoksi Reçine & Alkol Mürekkebi</option>
            <option value="steampunk">Steampunk (Pirinç, Çarklar ve Buhar Teknolojisi)</option>
            <option value="popart">Andy Warhol Pop Art (Çizgi Roman Estetiği)</option>
            <option value="graffiti">Patlayıcı Sokak Sanatı Graffiti</option>
            <option value="stainedglass">Muhteşem Vitray (Işık Saçan Cam Sanatı)</option>
            <option value="doubleexposure">Çift Pozlama (İç İçe Geçen Büyülü Manzara)</option>
        </optgroup>
    </select>

    <label for="promptInput">Ne üretmek veya yazdırmak istiyorsunuz?</label>
    <input type="text" id="promptInput" placeholder="Örn: Aslan, Kahve Molası, Uzay Gemisi...">

    <div class="settings-grid">
        <div>
            <label for="guidanceScale">Guidance Scale (AI Sadakati)</label>
            <input type="number" id="guidanceScale" value="7.5" step="0.1" min="1" max="20">
        </div>
        <div>
            <label for="numSteps">Inference Steps (Kalite)</label>
            <input type="number" id="numSteps" value="50" step="1" min="10" max="100">
        </div>
    </div>

    <div class="button-group">
        <button id="generateBtn" onclick="uretimeBasla(1)">Tekli Test</button>
        <button id="factoryBtn" onclick="uretimeBasla(2)">🚀 Otonom Fabrika (2x)</button>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="image-box">
        <div id="status">Sistem hazır...</div>
        <img id="result-img" src="" alt="Sonuç">
    </div>

    <div class="download-group">
        <button id="downloadPngBtn" onclick="gorseliIndirManuel('png')">⬇️ PNG İndir</button>
        <button id="downloadJpgBtn" onclick="gorseliIndirManuel('jpg')">⬇️ Yüksek Kalite JPEG İndir</button>
    </div>
</div>

<script>
    const sifreliKasa = "U2FsdGVkX1/7ytPepRabsGIChr25zzuga4wkk5q74mbbLrGDZD4VhMKw8mng7QncKmcyJGwPxZ0gAPHu2yEU/w==";
    const gizliPin = "1453"; 
    
    let isFactoryRunning = false;
    let currentPredictionId = null;
    let cachedApiKey = null;
    let lastGeneratedImgUrl = ""; 
    let currentTargetWidth = 1063;
    let currentTargetHeight = 1063;

    async function uretimeBasla(count) {
        const userSubject = document.getElementById('promptInput').value;
        const guidanceScale = parseFloat(document.getElementById('guidanceScale').value);
        const numSteps = parseInt(document.getElementById('numSteps').value);
        const printSize = document.getElementById('printSize').value;
        const selectedStyle = document.getElementById('styleSelect').value;
        
        let apiWidth, apiHeight;
        let formatModifier = "";
        
        // Akıllı Format Modifikasyonu (Fiziksel obje kelimeleri temizlendi)
        if (printSize === "wrap") { 
            apiWidth = 1344; apiHeight = 576; 
            currentTargetWidth = 2480; currentTargetHeight = 1063; 
            formatModifier = "seamless panoramic wrap-around illustration, wide horizontal landscape, full edge-to-edge composition, ";
        } 
        else if (printSize === "table") { 
            apiWidth = 1152; apiHeight = 864; 
            currentTargetWidth = 4724; currentTargetHeight = 3543; 
            formatModifier = "high-end masterpiece illustration, gallery quality, full edge-to-edge composition, center focused, ";
        } 
        else { 
            apiWidth = 1024; apiHeight = 1024; 
            currentTargetWidth = 1063; currentTargetHeight = 1063; 
            formatModifier = "centered graphic design, full edge-to-edge illustration, perfectly balanced, ";
        }

        const btnSingle = document.getElementById('generateBtn');
        const btnFactory = document.getElementById('factoryBtn');
        const statusEl = document.getElementById('status');
        const resultImg = document.getElementById('result-img');
        const progressBar = document.getElementById('progressBar');
        const dlPngBtn = document.getElementById('downloadPngBtn');
        const dlJpgBtn = document.getElementById('downloadJpgBtn');

        if (!userSubject) { alert("Lütfen ne üretmek istediğinizi yazın!"); return; }

        try {
            const bytes = CryptoJS.AES.decrypt(sifreliKasa, gizliPin);
            cachedApiKey = bytes.toString(CryptoJS.enc.Utf8);
            if (!cachedApiKey) { alert("Sistem kilit hatası!"); return; }

            isFactoryRunning = true; btnSingle.disabled = true; btnFactory.disabled = true;
            resultImg.style.display = "none"; dlPngBtn.style.display = "none"; dlJpgBtn.style.display = "none";
            document.getElementById('progressContainer').style.display = count > 1 ? "block" : "none";

            statusEl.innerHTML = "Çevriliyor... 🇹🇷 ➔ 🇬🇧"; statusEl.style.display = "block";
            let englishSubject = userSubject;
            try {
                const trRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(userSubject)}&langpair=tr|en`);
                const trData = await trRes.json();
                if(trData && trData.responseData && trData.responseData.translatedText) englishSubject = trData.responseData.translatedText;
            } catch(e) { console.warn("Çeviri hatası."); }

            for (let i = 1; i <= count; i++) {
                if (!isFactoryRunning) break;
                const seed = Math.floor(Math.random() * 1000000);
                statusEl.innerHTML = count > 1 ? `OTONOM ÜRETİM<br>Varyasyon: ${i} / ${count} (Seed: ${seed}) ⏳` : "Görsel İşleniyor... ⏳";
                progressBar.style.width = `${((i - 1) / count) * 100}%`;

                let basePrompt = ""; 
                // NEGATİF PROMPT GÜNCELLENDİ: Çerçeve, oda, müze duvarı gibi şeyler kesinlikle yasaklandı!
                let negativePrompt = "frame, picture frame, hanging on wall, interior room, easel, gallery wall, exhibition, border, mockup, text, watermark, typography, letters, signature, paper texture, folded paper, human hands, split image, double images, bad anatomy";

                switch(selectedStyle) {
                    // Dünya Klasikleri
                    case "renaissance": basePrompt = `An absolute masterpiece oil painting of ${englishSubject}. High Renaissance classical art style, Leonardo da Vinci and Michelangelo aesthetic, chiaroscuro dramatic lighting, deep rich oil paint colors, historical fine art, edge-to-edge masterpiece.`; break;
                    case "impressionism": basePrompt = `A beautiful impressionist painting of ${englishSubject}. Vincent Van Gogh and Claude Monet style, thick visible brushstrokes, starry night aesthetic, vibrant emotional colors, dynamic movement in the paint, edge-to-edge masterpiece.`; break;
                    case "surrealism": basePrompt = `A surrealistic masterpiece depicting ${englishSubject}. Salvador Dali style, dreamlike atmosphere, melting elements, bizarre landscapes, highly detailed subconscious art, mind-bending fantasy, edge-to-edge masterpiece.`; break;
                    
                    // Hype Akımlar
                    case "unrealengine": basePrompt = `Extremely highly detailed ${englishSubject}, rendered in Unreal Engine 5. Hyper-realistic, 8k resolution, ray tracing reflections, cinematic global illumination, insanely detailed textures, volumetric fog, octane render masterpiece.`; break;
                    case "synthwave": basePrompt = `Retrowave 1980s synthwave aesthetic of ${englishSubject}. Glowing neon grids, outrun style, vibrant magenta and cyan colors, digital sunset, cyber retro futurism.`; break;
                    case "darkfantasy": basePrompt = `Epic dark fantasy RPG concept art of ${englishSubject}. Elden Ring and Dark Souls aesthetic, gothic, moody atmospheric lighting, highly detailed intricate armor or environments, masterpiece illustration.`; break;
                    case "cyberpunk": basePrompt = `A futuristic cyberpunk vision of ${englishSubject}. High-tech neon city lighting, holographic details, dystopian sci-fi atmosphere, vibrant glowing pink and blue accents, ultra-detailed 8k.`; break;

                    // İllüzyonlar & Derinlik
                    case "popout": basePrompt = `${englishSubject} bursting and popping out of the surface. Faux 3D optical illusion, trompe l'oeil effect, stark heavy drop shadows casting on the background, 3D relief pop-out effect, extreme depth of field.`; break;
                    case "embossed": basePrompt = `A surface texture showing a highly detailed ${englishSubject} sculpted as a 3D embossed ceramic relief. Faux 3D texture, strong directional studio lighting, realistic stone or matte ceramic shadows, tactile depth illusion.`; break;
                    case "portal": basePrompt = `A glowing interdimensional portal cracking open, revealing a breathtaking world of ${englishSubject} inside the rift. Faux 3D optical illusion, extreme depth, glowing edges, surrealism.`; break;
                    case "escher": basePrompt = `Mind-bending impossible geometry optical illusion featuring ${englishSubject}. M.C. Escher style, continuous paradox, interlocking shapes, highly detailed geometric perfection.`; break;
                    case "isometric": basePrompt = `Highly detailed isometric 3D miniature diorama of ${englishSubject}. Tilt-shift macro photography effect, tiny toy world aesthetic, faux 3D optical illusion floating on a solid background.`; break;
                    
                    // Modern & Dokusal
                    case "resin": basePrompt = `Abstract luxury epoxy resin art and alcohol ink fluid painting forming the shape of ${englishSubject}. Swirling marble textures, gold foil flakes, vibrant liquid dye blending, high gloss illusion.`; break;
                    case "steampunk": basePrompt = `Intricate steampunk mechanical ${englishSubject}, made entirely of brass gears, copper cogs, and glowing steam pipes. Victorian industrial style, 3D faux relief mechanical art.`; break;
                    case "popart": basePrompt = `Vibrant retro comic book Pop Art of ${englishSubject}. Andy Warhol and Roy Lichtenstein style, bright bold colors, halftone dots, thick black comic outlines, vintage graphic.`; break;
                    case "stainedglass": basePrompt = `A stunning intricate stained glass window depicting ${englishSubject}. Vibrant jewel-tone colors, thick dark lead lines, glowing bright light shining through from behind, faux 3D volumetric lighting.`; break;
                    case "doubleexposure": basePrompt = `Cinematic double exposure photography blending a perfect silhouette of ${englishSubject} with a breathtaking magical fantasy landscape inside the silhouette. High contrast, surrealism.`; break;
                    case "graffiti": basePrompt = `Vibrant, explosive urban graffiti wall art of ${englishSubject}. Spray paint drips, bold street art style, faux 3D pop-out graffiti, highly detailed colorful texture.`; break;
                }

                let finalPrompt = formatModifier + basePrompt;

                const startRes = await fetch("/api/generate", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        token: cachedApiKey, prompt: finalPrompt, negative_prompt: negativePrompt,
                        guidance_scale: guidanceScale, num_inference_steps: numSteps,
                        width: apiWidth, height: apiHeight, seed: seed
                    })
                });

                const startData = await startRes.json();
                if (startData.error) throw new Error(startData.error);
                currentPredictionId = startData.id;

                while (currentPredictionId) {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    const pollRes = await fetch(`/api/status/${currentPredictionId}`, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ token: cachedApiKey })
                    });
                    const pollData = await pollRes.json();

                    if (pollData.status === "succeeded") {
                        const imgUrl = pollData.output[0];
                        lastGeneratedImgUrl = imgUrl; 
                        resultImg.src = imgUrl; resultImg.style.display = "block";
                        
                        if(count === 1) { dlPngBtn.style.display = "block"; dlJpgBtn.style.display = "block"; } 
                        else {
                            await new Promise(res => setTimeout(res, 1500));
                            const dosyaAdi = `Mug-AI-${selectedStyle}-${englishSubject.replace(/\s+/g, '-')}-var${i}-s${seed}`;
                            await indirFormat(imgUrl, dosyaAdi, 'png', currentTargetWidth, currentTargetHeight);
                            await indirFormat(imgUrl, dosyaAdi, 'jpg', currentTargetWidth, currentTargetHeight);
                        }
                        currentPredictionId = null; break;
                    } else if (pollData.status === "failed" || pollData.status === "canceled") {
                        throw new Error("Üretim reddetti veya iptal edildi.");
                    }
                }
            }
            progressBar.style.width = "100%";
            statusEl.innerHTML = count > 1 ? "✅ Fabrika Üretimi Tamamlandı!" : "✅ Üretim Tamam!";

        } catch (error) { console.error(error); alert("Hata: " + error.message); } 
        finally {
            btnSingle.disabled = false; btnFactory.disabled = false;
            if(count === 1) statusEl.style.display = "none";
            isFactoryRunning = false; currentPredictionId = null;
        }
    }

    async function gorseliIndirManuel(format) {
        if(!lastGeneratedImgUrl) return;
        const selectedStyle = document.getElementById('styleSelect').value;
        const filename = `Mug-AI-${selectedStyle}-${Date.now()}`;
        await indirFormat(lastGeneratedImgUrl, filename, format, currentTargetWidth, currentTargetHeight);
    }

    async function indirFormat(imgUrl, filename, format, tWidth, tHeight) {
        try {
            const response = await fetch(imgUrl);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const img = new Image(); img.crossOrigin = "Anonymous";
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = tWidth; canvas.height = tHeight;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = "high";
                
                if (format === 'jpg' || format === 'jpeg') { ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, canvas.width, canvas.height); } 
                else { ctx.clearRect(0, 0, canvas.width, canvas.height); }
                ctx.drawImage(img, 0, 0, tWidth, tHeight);
                
                canvas.toBlob((finalBlob) => {
                    const finalUrl = window.URL.createObjectURL(finalBlob);
                    const a = document.createElement('a'); a.href = finalUrl; a.download = `${filename}.${format}`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                }, format === 'png' ? 'image/png' : 'image/jpeg', 1.0); 
            };
            img.onerror = () => window.open(imgUrl, '_blank');
            img.src = blobUrl;
        } catch (e) { window.open(imgUrl, '_blank'); }
    }

    window.addEventListener('beforeunload', () => {
        isFactoryRunning = false;
        if (currentPredictionId && cachedApiKey) {
            fetch('/api/cancel', {
                method: 'POST', headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: currentPredictionId, token: cachedApiKey }), keepalive: true 
            });
        }
    });
</script>
</body>
</html>
