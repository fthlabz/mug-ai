<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wallpaper-AI: PrintMarkt Global Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; 
            --primary: #3b82f6; --primary-hover: #2563eb; 
            --factory: #8b5cf6; --factory-hover: #7c3aed;
            --success: #10b981; --warning: #f59e0b; --upscale: #ec4899;
        }
        
        html, body { overflow-x: hidden; max-width: 100vw; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }
        
        .app-container { 
            background: var(--card-bg); padding: 30px; border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 100%; max-width: 800px; 
            display: flex; flex-direction: column; box-sizing: border-box;
            margin-top: 20px; margin-bottom: 20px;
        }
        
        .header { text-align: center; margin-bottom: 20px; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 26px; color: var(--primary); }
        .header p { margin: 5px 0 0; color: #94a3b8; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
        
        input[type="text"], input[type="number"], select { 
            width: 100%; max-width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #334155; 
            background: #0f172a; color: white; box-sizing: border-box; font-size: 15px; margin-bottom: 15px;
        }
        
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        optgroup { font-weight: bold; color: #fbbf24; background: #0f172a;}
        
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .button-group { display: flex; gap: 10px; flex-shrink: 0; margin-top: 5px; }
        button { 
            flex: 1; padding: 16px; color: white; border: none; border-radius: 10px; 
            font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        #generateBtn { background: var(--primary); }
        #generateBtn:hover { background: var(--primary-hover); }
        
        /* Upscale ve İndirme Butonları */
        .action-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        #upscaleBtn { background: var(--upscale); display: none; }
        #upscaleBtn:hover { background: #db2777; }
        .download-group { display: flex; gap: 10px; display: none; }
        #downloadPngBtn { background: var(--success); }
        #downloadJpgBtn { background: var(--warning); }
        #downloadPngBtn:hover { background: #059669; }
        #downloadJpgBtn:hover { background: #d97706; }
        button:disabled { background: #475569 !important; color: #94a3b8; cursor: not-allowed; }

        .progress-container { margin-top: 15px; display: none; background: #334155; border-radius: 8px; height: 8px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--upscale); width: 0%; transition: width 0.3s; }

        .image-box {
            flex-grow: 1; margin-top: 15px; border: 2px dashed #475569; border-radius: 12px;
            display: flex; justify-content: center; align-items: center; position: relative;
            background: #0f172a; overflow: hidden; min-height: 400px;
        }
        #status { font-size: 15px; color: #fbbf24; font-weight: bold; display: none; position: absolute; text-align: center; z-index: 10; padding: 15px; background: rgba(15,23,42,0.8); border-radius: 8px;}
        #result-img { max-width: 100%; max-height: 100%; display: none; object-fit: contain; z-index: 5; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .app-container { padding: 20px; margin-top: 10px; border-radius: 12px; }
            .settings-grid { grid-template-columns: 1fr; gap: 10px; } 
            .button-group, .download-group { flex-direction: column; } 
            button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Wallpaper-AI Engine</h1>
        <p>Global Print-on-Demand & Upscale Factory</p>
    </div>

    <label for="printSize">Baskı Modeli ve Üretim Çıktısı</label>
    <select id="printSize">
        <option value="seamless">Rulo Duvar Kağıdı (Kusursuz Tekrar Eden Kalıp - 1024x1024)</option>
        <option value="mural">Mural / Tam Duvar Manzara (Panoramik Tek Parça - 1344x768)</option>
    </select>

    <label for="styleSelect">Etsy & Global Duvar Kağıdı Trendleri</label>
    <select id="styleSelect">
        <optgroup label="🌿 Botanik & Doğa (En Çok Satanlar)">
            <option value="darkacademia">Dark Academia Botanik (Karanlık, Zarif, Vintage)</option>
            <option value="chinoiserie">Vintage Chinoiserie (Uzak Doğu Kuşları ve Çiçekler)</option>
            <option value="tropical">Tropikal Orman (Monstera Yaprakları ve Papağanlar)</option>
            <option value="bohofloral">Boho Floral (Toprak Tonları, Sulu Boya Çiçekler)</option>
        </optgroup>
        <optgroup label="🧸 Çocuk Odası (Nursery)">
            <option value="scandinaviandiy">İskandinav Minimal Hayvanlar (Sulu Boya)</option>
            <option value="spaceexplorer">Pastel Uzay ve Gezegenler</option>
        </optgroup>
        <optgroup label="🖼️ Mural Manzaralar (Sadece Tablo/Mural Modu)">
            <option value="mistyforest">Sisli Dağ ve Çam Ormanı Manzarası</option>
            <option value="vintageengraving">Eski Dünya Haritası (Klasik Gravür Tarzı)</option>
        </optgroup>
    </select>

    <label for="promptInput">Odak Konusu / Özel İstek (İsteğe Bağlı)</label>
    <input type="text" id="promptInput" placeholder="Örn: Siyah zemin üzerine altın yapraklar, mavi kuşlar...">

    <div class="settings-grid">
        <div>
            <label for="guidanceScale">AI Sadakati (Guidance)</label>
            <input type="number" id="guidanceScale" value="7.5" step="0.1" min="1" max="20">
        </div>
        <div>
            <label for="numSteps">Üretim Kalitesi (Steps)</label>
            <input type="number" id="numSteps" value="50" step="1" min="10" max="100">
        </div>
    </div>

    <div class="button-group">
        <button id="generateBtn" onclick="uretimeBasla()">🎨 Tasarımı Üret (Önizleme)</button>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="image-box">
        <div id="status">Sistem hazır...</div>
        <img id="result-img" src="" alt="Sonuç">
    </div>

    <div class="action-group">
        <button id="upscaleBtn" onclick="replicateUpscaleYap()">🚀 Yapay Zeka ile HD Büyüt (Replicate)</button>
        <div class="download-group" id="downloadGroup">
            <button id="downloadPngBtn" onclick="gorseliIndirManuel('png')">⬇️ 300 DPI PNG İndir</button>
            <button id="downloadJpgBtn" onclick="gorseliIndirManuel('jpg')">⬇️ 300 DPI JPEG İndir</button>
        </div>
    </div>
</div>

<script>
    // Hayalet Kilit: Güvenlik Mimariniz Standarda Uygun Şekilde Korunmuştur
    const sifreliKasa = "U2FsdGVkX1/7ytPepRabsGIChr25zzuga4wkk5q74mbbLrGDZD4VhMKw8mng7QncKmcyJGwPxZ0gAPHu2yEU/w=="; 
    const gizliPin = "1453"; 
    
    let cachedApiKey = null;
    let lastGeneratedImgUrl = ""; 
    let finalUpscaledImgUrl = "";
    let isProcessing = false;

    // Şifre Çözücü Fonksiyon
    function getToken() {
        if(cachedApiKey) return cachedApiKey;
        try {
            const bytes = CryptoJS.AES.decrypt(sifreliKasa, gizliPin);
            cachedApiKey = bytes.toString(CryptoJS.enc.Utf8);
            return cachedApiKey;
        } catch(e) { alert("Güvenlik Kilidi Hatası!"); return null; }
    }

    async function uretimeBasla() {
        if (isProcessing) return;
        const token = getToken(); if (!token) return;

        const userSubject = document.getElementById('promptInput').value;
        const printSize = document.getElementById('printSize').value;
        const selectedStyle = document.getElementById('styleSelect').value;
        
        let apiWidth = printSize === "mural" ? 1344 : 1024;
        let apiHeight = printSize === "mural" ? 768 : 1024;

        const uiElements = {
            btnGen: document.getElementById('generateBtn'),
            btnUpscale: document.getElementById('upscaleBtn'),
            dlGroup: document.getElementById('downloadGroup'),
            status: document.getElementById('status'),
            resultImg: document.getElementById('result-img')
        };

        try {
            isProcessing = true;
            uiElements.btnGen.disabled = true;
            uiElements.btnUpscale.style.display = "none";
            uiElements.dlGroup.style.display = "none";
            uiElements.status.innerHTML = "İngilizceye Çevriliyor... 🇹🇷 ➔ 🇬🇧"; 
            uiElements.status.style.display = "block";

            let englishSubject = userSubject;
            if(userSubject) {
                try {
                    const trRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(userSubject)}&langpair=tr|en`);
                    const trData = await trRes.json();
                    if(trData?.responseData?.translatedText) englishSubject = trData.responseData.translatedText;
                } catch(e) { console.warn("Çeviri hatası."); }
            }

            uiElements.status.innerHTML = "Tasarım İşleniyor... ⏳";
            const seed = Math.floor(Math.random() * 1000000);
            
            // Duvar Kağıdı Prompt Mühendisliği
            let finalPrompt = "";
            let basePrompt = englishSubject ? `${englishSubject}, ` : "";
            let isSeamless = printSize === "seamless" ? "seamless repeating pattern, perfect tileable flat wallpaper texture, " : "flat huge wall mural design, ";
            let negativePrompt = "mockup, frame, 3d object, human, hands, watermarks, text, ugly, split image";

            switch(selectedStyle) {
                case "darkacademia": finalPrompt = `${basePrompt}Dark academia botanical wallpaper, moody vintage scientific illustrations of flowers and foliage, deep dark dramatic background, highly detailed luxury art, ${isSeamless} 8k.`; break;
                case "chinoiserie": finalPrompt = `${basePrompt}Vintage Chinoiserie wallpaper style, elegant traditional asian art, soft pastel background, luxurious flora and fauna, painted aesthetic, ${isSeamless} flat vector illustration.`; break;
                case "tropical": finalPrompt = `${basePrompt}Lush tropical jungle botanical wallpaper, large monstera leaves, exotic palm fronds, vibrant rich colors, dense foliage, ${isSeamless} flat printable design.`; break;
                case "bohofloral": finalPrompt = `${basePrompt}Boho floral aesthetic wallpaper, muted earthy tones, terracotta, sage green, oversized abstract watercolor blooming flowers, ${isSeamless} modern art.`; break;
                case "scandinaviandiy": finalPrompt = `${basePrompt}Cute Scandinavian nursery wallpaper, minimal watercolor aesthetic, soft neutral pastel colors, cozy kids room design, ${isSeamless} flat illustration.`; break;
                case "spaceexplorer": finalPrompt = `${basePrompt}Magical pastel space and planets nursery wallpaper, cute stars, watercolor milky way, cozy aesthetic, ${isSeamless} beautiful flat print.`; break;
                case "mistyforest": finalPrompt = `${basePrompt}Foggy pine forest mountain landscape, huge atmospheric wall mural, misty morning panoramic view, watercolor painting style, highly detailed continuous background.`; break;
                case "vintageengraving": finalPrompt = `${basePrompt}Old world map vintage engraving style, classical etching illustration, highly detailed lines, antique sepia tones, majestic wall mural flat print.`; break;
            }

            const startRes = await fetch("/api/generate", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    token: token, prompt: finalPrompt, negative_prompt: negativePrompt,
                    width: apiWidth, height: apiHeight, seed: seed
                })
            });

            const startData = await startRes.json();
            if (startData.error) throw new Error(startData.error);
            let currentPredictionId = startData.id;

            // Polling Döngüsü
            while (currentPredictionId) {
                await new Promise(resolve => setTimeout(resolve, 2000));
                const pollRes = await fetch(`/api/status/${currentPredictionId}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: token })
                });
                const pollData = await pollRes.json();

                if (pollData.status === "succeeded") {
                    lastGeneratedImgUrl = pollData.output[0]; 
                    uiElements.resultImg.src = lastGeneratedImgUrl; 
                    uiElements.resultImg.style.display = "block";
                    uiElements.btnUpscale.style.display = "block"; // Upscale butonunu göster
                    uiElements.status.style.display = "none";
                    break;
                } else if (pollData.status === "failed") {
                    throw new Error("Üretim reddetti.");
                }
            }
        } catch (error) { alert("Hata: " + error.message); } 
        finally {
            uiElements.btnGen.disabled = false;
            isProcessing = false;
        }
    }

    // Replicate AI ile Gerçek Büyütme İşlemi
    async function replicateUpscaleYap() {
        if (!lastGeneratedImgUrl || isProcessing) return;
        const token = getToken(); if (!token) return;

        const statusEl = document.getElementById('status');
        const progContainer = document.getElementById('progressContainer');
        const progBar = document.getElementById('progressBar');
        const btnUpscale = document.getElementById('upscaleBtn');
        const dlGroup = document.getElementById('downloadGroup');

        try {
            isProcessing = true;
            btnUpscale.disabled = true;
            statusEl.innerHTML = "Replicate AI Detayları Çiziyor... (Bu işlem 1-2 dk sürebilir) 🚀"; 
            statusEl.style.display = "block";
            progContainer.style.display = "block";
            
            // Sahte Progress Bar animasyonu (Kullanıcıyı tutmak için)
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 5;
                if(progress > 90) progress = 90;
                progBar.style.width = `${progress}%`;
            }, 1000);

            // Sunucudaki Replicate API Proxy'nize istek atıyoruz
            // Not: Replicate, tarayıcıdan (Frontend) doğrudan gelen istekleri CORS sebebiyle engeller.
            // Bu yüzden orijinal sistemindeki gibi /api/upscale isimli bir proxy yoluna gönderiyoruz.
            const upscaleRes = await fetch("/api/upscale", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    token: token, 
                    image_url: lastGeneratedImgUrl,
                    scale: 4 // Orijinal resmi 4 katına (örn: 1024 -> 4096px) çıkarır ve detay ekler
                })
            });

            const upscaleData = await upscaleRes.json();
            clearInterval(progressInterval);

            if (upscaleData.status === "succeeded" || upscaleData.output) {
                finalUpscaledImgUrl = upscaleData.output;
                document.getElementById('result-img').src = finalUpscaledImgUrl; // HD versiyonu ekrana bas
                progBar.style.width = "100%";
                statusEl.innerHTML = "✅ Büyütme Tamam! Dosya Baskıya Hazır.";
                btnUpscale.style.display = "none";
                dlGroup.style.display = "flex"; // İndirme butonlarını aç
            } else {
                throw new Error("Upscale işlemi başarısız oldu.");
            }

        } catch (error) { 
            alert("Büyütme Hatası: " + error.message); 
            statusEl.style.display = "none";
            btnUpscale.disabled = false;
        } finally {
            setTimeout(() => { progContainer.style.display = "none"; }, 2000);
            isProcessing = false;
        }
    }

    // Doğal Çözünürlükte İndirme (Sündürmeden)
    async function gorseliIndirManuel(format) {
        if(!finalUpscaledImgUrl) return;
        const selectedStyle = document.getElementById('styleSelect').value;
        const filename = `Wallpaper-AI-${selectedStyle}-${Date.now()}`;
        
        try {
            const response = await fetch(finalUpscaledImgUrl);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            // Doğrudan doğal boyutu ile canvasa aktarıp indiriyoruz. Sündürme (stretch) yok!
            const img = new Image(); img.crossOrigin = "Anonymous";
            img.onload = () => {
                const canvas = document.createElement('canvas');
                // Resmin Replicate'ten gelen HD orjinal ölçülerini baz alıyoruz
                canvas.width = img.naturalWidth; 
                canvas.height = img.naturalHeight; 
                const ctx = canvas.getContext('2d');
                
                if (format === 'jpg' || format === 'jpeg') { 
                    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, canvas.width, canvas.height); 
                } 
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob((finalBlob) => {
                    const finalUrl = window.URL.createObjectURL(finalBlob);
                    const a = document.createElement('a'); a.href = finalUrl; a.download = `${filename}.${format}`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                }, format === 'png' ? 'image/png' : 'image/jpeg', 1.0); 
            };
            img.src = blobUrl;
        } catch (e) { 
            // Eğer CORS veya Blob hatası olursa sekme açarak indirmeyi garantiye al
            window.open(finalUpscaledImgUrl, '_blank'); 
        }
    }
</script>
</body>
</html>
