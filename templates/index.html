<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mug-AI: SaaS Autonomous Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text: #f8fafc; 
            --primary: #3b82f6; 
            --primary-hover: #2563eb; 
            --factory: #8b5cf6;
            --factory-hover: #7c3aed;
            --success: #10b981; 
            --warning: #f59e0b;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .app-container { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            width: 100%; 
            max-width: 650px; 
            display: flex; 
            flex-direction: column;
            box-sizing: border-box;
        }
        .header { text-align: center; margin-bottom: 20px; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 26px; color: var(--primary); }
        .header p { margin: 5px 0 0; color: #94a3b8; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
        input[type="text"], input[type="number"], select { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: 2px solid #334155; 
            background: #0f172a;
            color: white;
            box-sizing: border-box; 
            font-size: 16px; 
            margin-bottom: 15px;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        .button-group { display: flex; gap: 10px; flex-shrink: 0; margin-top: 5px; }
        button { 
            flex: 1;
            padding: 16px; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        #generateBtn { background: var(--primary); }
        #generateBtn:hover { background: var(--primary-hover); }
        #factoryBtn { background: var(--factory); }
        #factoryBtn:hover { background: var(--factory-hover); }
        button:disabled { background: #475569 !important; color: #94a3b8; cursor: not-allowed; }
        
        .download-group { display: flex; gap: 10px; margin-top: 15px; }
        #downloadPngBtn { background: var(--success); display: none; }
        #downloadJpgBtn { background: var(--warning); display: none; }
        #downloadPngBtn:hover { background: #059669; }
        #downloadJpgBtn:hover { background: #d97706; }

        .progress-container { margin-top: 15px; display: none; background: #334155; border-radius: 8px; height: 8px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--factory); width: 0%; transition: width 0.3s; }

        .image-box {
            flex-grow: 1;
            margin-top: 15px;
            border: 2px dashed #475569;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #0f172a;
            overflow: hidden;
            min-height: 250px;
        }
        #status { font-size: 15px; color: #fbbf24; font-weight: bold; display: none; position: absolute; text-align: center; z-index: 10; padding: 15px;}
        #result-img { max-width: 100%; max-height: 100%; display: none; object-fit: contain; z-index: 5; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Mug-AI Autonomous Engine</h1>
        <p>Pro-Level SaaS Print Generator</p>
    </div>

    <label for="printSize">Baskı Boyutu (Çözünürlük)</label>
    <select id="printSize">
        <option value="wrap">Panoramik (Kupayı Saran - 1344x768)</option>
        <option value="square">Kare (Sadece Ön Yüz - 1024x1024)</option>
    </select>

    <label for="promptInput">Ne üretmek istiyorsunuz?</label>
    <input type="text" id="promptInput" placeholder="Beyaz yavru kedi">

    <div class="settings-grid">
        <div>
            <label for="guidanceScale">Guidance Scale (AI Sadakati)</label>
            <input type="number" id="guidanceScale" value="6.5" step="0.1" min="1" max="20">
        </div>
        <div>
            <label for="numSteps">Inference Steps (Kalite)</label>
            <input type="number" id="numSteps" value="50" step="1" min="10" max="100">
        </div>
    </div>

    <div class="button-group">
        <button id="generateBtn" onclick="uretimeBasla(1)">Tekli Test</button>
        <button id="factoryBtn" onclick="uretimeBasla(2)">🚀 Otonom Fabrika (2x)</button>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="image-box">
        <div id="status">Sistem hazır...</div>
        <img id="result-img" src="" alt="Sonuç">
    </div>

    <div class="download-group">
        <button id="downloadPngBtn" onclick="gorseliIndirManuel('png')">⬇️ PNG İndir</button>
        <button id="downloadJpgBtn" onclick="gorseliIndirManuel('jpg')">⬇️ Yüksek Kalite JPEG İndir</button>
    </div>
</div>

<script>
    const sifreliKasa = "U2FsdGVkX1/7ytPepRabsGIChr25zzuga4wkk5q74mbbLrGDZD4VhMKw8mng7QncKmcyJGwPxZ0gAPHu2yEU/w==";
    const gizliPin = "1453"; 
    
    let isFactoryRunning = false;
    let currentPredictionId = null;
    let cachedApiKey = null;
    let lastGeneratedImgUrl = ""; 

    async function uretimeBasla(count) {
        const userSubject = document.getElementById('promptInput').value;
        const guidanceScale = parseFloat(document.getElementById('guidanceScale').value);
        const numSteps = parseInt(document.getElementById('numSteps').value);
        
        const printSize = document.getElementById('printSize').value;
        const width = printSize === "wrap" ? 1344 : 1024;
        const height = printSize === "wrap" ? 768 : 1024;

        const btnSingle = document.getElementById('generateBtn');
        const btnFactory = document.getElementById('factoryBtn');
        const statusEl = document.getElementById('status');
        const resultImg = document.getElementById('result-img');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const dlPngBtn = document.getElementById('downloadPngBtn');
        const dlJpgBtn = document.getElementById('downloadJpgBtn');

        if (!userSubject) { alert("Lütfen ne üretmek istediğinizi yazın!"); return; }

        try {
            const bytes = CryptoJS.AES.decrypt(sifreliKasa, gizliPin);
            cachedApiKey = bytes.toString(CryptoJS.enc.Utf8);
            if (!cachedApiKey) { alert("Sistem kilit hatası!"); return; }

            isFactoryRunning = true;
            btnSingle.disabled = true;
            btnFactory.disabled = true;
            resultImg.style.display = "none";
            dlPngBtn.style.display = "none";
            dlJpgBtn.style.display = "none";
            progressContainer.style.display = count > 1 ? "block" : "none";

            statusEl.innerHTML = "Çevriliyor... 🇹🇷 ➔ 🇬🇧";
            statusEl.style.display = "block";
            let englishSubject = userSubject;
            
            try {
                const trRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(userSubject)}&langpair=tr|en`);
                const trData = await trRes.json();
                if(trData && trData.responseData && trData.responseData.translatedText) {
                    englishSubject = trData.responseData.translatedText;
                }
            } catch(e) { console.warn("Çeviri başarısız, orijinal metin kullanılıyor."); }

            for (let i = 1; i <= count; i++) {
                if (!isFactoryRunning) break;

                const seed = Math.floor(Math.random() * 1000000);

                statusEl.innerHTML = count > 1 
                    ? `OTONOM ÜRETİM<br>Varyasyon: ${i} / ${count} (Seed: ${seed}) ⏳<br><small>Ön izleme sonrası otomatik indiriliyor.</small>` 
                    : "Master Görsel İşleniyor... ⏳";
                
                progressBar.style.width = `${((i - 1) / count) * 100}%`;

                // --- EN BÜYÜK DEĞİŞİKLİK BURADA ---
                // "Diorama" ve "Shadow box" hileleriyle dış duvarı zorluyoruz.
                const finalPrompt = `Macro photography of a thick, fluffy white snow and cloud solid border completely covering all four edges of the image. This fluffy wall creates a physical, deep, circular tunnel hole. Right in the center, looking out from INSIDE this deep white hole, is a highly detailed ${englishSubject}. The fluffy edges in the foreground are heavily blurred (extreme depth of field). 3D diorama style, shadow box concept, perfectly enclosed circular vignette, 8k resolution, masterpiece.`;
                
                // Negatif prompt ile yapay zekanın "doğal açık alan" çizmesini yasaklıyoruz!
                const negativePrompt = `open sky, natural landscape, outdoors, flat background, missing frame, missing border, cut off frame, blurry subject, low quality`;

                const startRes = await fetch("/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        token: cachedApiKey, 
                        prompt: finalPrompt,
                        negative_prompt: negativePrompt,
                        guidance_scale: guidanceScale, 
                        num_inference_steps: numSteps,
                        width: width, 
                        height: height, 
                        seed: seed
                    })
                });

                const startData = await startRes.json();
                if (startData.error) throw new Error(startData.error);
                
                currentPredictionId = startData.id;

                while (currentPredictionId) {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    const pollRes = await fetch(`/api/status/${currentPredictionId}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ token: cachedApiKey })
                    });
                    const pollData = await pollRes.json();

                    if (pollData.status === "succeeded") {
                        const imgUrl = pollData.output[0];
                        lastGeneratedImgUrl = imgUrl; 
                        
                        resultImg.src = imgUrl;
                        resultImg.style.display = "block";
                        
                        if(count === 1) {
                            dlPngBtn.style.display = "block";
                            dlJpgBtn.style.display = "block";
                        } else {
                            await new Promise(res => setTimeout(res, 1500));
                            const dosyaAdi = `Mug-AI-${englishSubject.replace(/\s+/g, '-')}-var${i}-s${seed}`;
                            await indirFormat(imgUrl, dosyaAdi, 'png');
                            await indirFormat(imgUrl, dosyaAdi, 'jpg');
                        }
                        
                        currentPredictionId = null; 
                        break;
                    } else if (pollData.status === "failed" || pollData.status === "canceled") {
                        throw new Error("Üretim iptal edildi veya başarısız oldu.");
                    }
                }
            }
            
            progressBar.style.width = "100%";
            statusEl.innerHTML = count > 1 ? "✅ Fabrika Üretimi Tamamlandı!" : "✅ Üretim Tamam!";

        } catch (error) {
            console.error("Hata:", error);
            alert("Hata: " + error.message);
        } finally {
            btnSingle.disabled = false;
            btnFactory.disabled = false;
            if(count === 1) statusEl.style.display = "none";
            isFactoryRunning = false;
            if(currentPredictionId) currentPredictionId = null;
        }
    }

    async function gorseliIndirManuel(format) {
        if(!lastGeneratedImgUrl) return;
        const filename = `Mug-AI-Single-${Date.now()}`;
        await indirFormat(lastGeneratedImgUrl, filename, format);
    }

    async function indirFormat(imgUrl, filename, format) {
        try {
            const response = await fetch(imgUrl);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            if (format === 'png') {
                tetikleIndirme(blobUrl, `${filename}.png`);
            } else if (format === 'jpg' || format === 'jpeg') {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    
                    canvas.toBlob((jpegBlob) => {
                        const jpegUrl = window.URL.createObjectURL(jpegBlob);
                        tetikleIndirme(jpegUrl, `${filename}.jpg`);
                    }, 'image/jpeg', 1.0); 
                };
                img.src = blobUrl;
            }
        } catch (e) {
            window.open(imgUrl, '_blank');
        }
    }

    function tetikleIndirme(url, dosyaAdi) {
        const a = document.createElement('a');
        a.href = url;
        a.download = dosyaAdi;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    window.addEventListener('beforeunload', (event) => {
        isFactoryRunning = false;
        if (currentPredictionId && cachedApiKey) {
            fetch('/api/cancel', {
                method: 'POST',
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: currentPredictionId, token: cachedApiKey }),
                keepalive: true 
            });
        }
    });
</script>
</body>
</html>
